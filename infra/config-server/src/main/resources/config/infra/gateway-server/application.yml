server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/admin/users/**
        - id: main-service
          uri: lb://main-service
          predicates:
            - Path=/admin/**,/users/**,/events,/events/**,/categories,/categories/**,/compilations,/compilations/**,/comments/**
